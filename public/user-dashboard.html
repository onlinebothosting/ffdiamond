<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Dashboard | FF Diamond</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #0f0a1a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .bg-premium {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255,215,0,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(176,68,255,0.08) 0%, transparent 50%);
        }

        .dashboard-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .user-details h2 {
            font-family: 'Orbitron', monospace;
            font-size: 20px;
        }

        .user-details p {
            font-size: 12px;
            opacity: 0.7;
        }

        .logout-btn {
            background: rgba(255,68,68,0.2);
            border: 1px solid rgba(255,68,68,0.5);
            padding: 10px 20px;
            border-radius: 40px;
            color: #ff6b6b;
            cursor: pointer;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .stat-number {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: bold;
            color: #FFD700;
        }

        /* Claims Table */
        .claims-table {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: #FFD700;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-pending { background: rgba(255,165,0,0.2); color: #ffa500; }
        .status-completed { background: rgba(0,255,0,0.2); color: #0f0; }
        .status-failed { background: rgba(255,0,0,0.2); color: #f00; }

        .password-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
        }

        .password-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .password-input input {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            color: white;
        }

        .set-password-btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .dashboard-container { padding: 15px; }
            th, td { font-size: 12px; padding: 8px; }
        }
    </style>
</head>
<body>
<div class="bg-premium"></div>

<div class="dashboard-container">
    <!-- Login Section (initially visible) -->
    <div id="loginSection" style="max-width: 500px; margin: 100px auto;">
        <div class="dashboard-header" style="flex-direction: column; text-align: center;">
            <div class="user-avatar" style="width: 80px; height: 80px; font-size: 40px;">
                <i class="fas fa-user"></i>
            </div>
            <h2>Login with FF UID</h2>
            <p>Enter your Free Fire UID to access dashboard</p>
            <input type="text" id="loginUid" placeholder="Enter your UID (8-12 digits)" 
                   style="width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; color: white;">
            <div id="passwordField" style="display: none; width: 100%; margin-top: 10px;">
                <input type="password" id="loginPassword" placeholder="Password (if set)" 
                       style="width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; color: white;">
            </div>
            <div id="newUserFields" style="display: none; width: 100%; margin-top: 10px;">
                <input type="text" id="newGameName" placeholder="Your In-Game Name" 
                       style="width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; color: white;">
                <input type="email" id="newEmail" placeholder="Recovery Email" 
                       style="width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; color: white;">
            </div>
            <button onclick="userLogin()" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #FFD700, #FFA500); border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 15px;">
                Login / Register
            </button>
            <a href="/" style="color: #FFD700; margin-top: 15px;">← Back to Home</a>
        </div>
    </div>

    <!-- Dashboard Section (after login) -->
    <div id="dashboardSection" style="display: none;">
        <div class="dashboard-header">
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user-ninja"></i>
                </div>
                <div class="user-details">
                    <h2 id="userGameName">Loading...</h2>
                    <p>UID: <span id="userUid">-</span></p>
                    <p>Email: <span id="userEmail">-</span></p>
                </div>
            </div>
            <button class="logout-btn" onclick="userLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="claims-table">
            <div class="section-title">
                <i class="fas fa-history"></i> My Claim History
            </div>
            <div class="table-wrapper" style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Date</th><th>Diamonds</th><th>Server</th><th>Status</th><th>ID</th></tr>
                    </thead>
                    <tbody id="claimsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="password-section">
            <div class="section-title">
                <i class="fas fa-lock"></i> Security Settings
            </div>
            <p>Set a password to secure your account (optional)</p>
            <div class="password-input">
                <input type="password" id="newPassword" placeholder="Enter new password">
                <button class="set-password-btn" onclick="setPassword()">Set Password</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Check if user is logged in
    async function checkUserSession() {
        try {
            const res = await fetch('/api/user/check', { credentials: 'include' });
            const data = await res.json();
            
            if (data.isLoggedIn) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                loadDashboard();
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('dashboardSection').style.display = 'none';
            }
        } catch(e) {
            console.error('Session check error:', e);
        }
    }

    async function userLogin() {
        const uid = document.getElementById('loginUid').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const gameName = document.getElementById('newGameName')?.value.trim();
        const email = document.getElementById('newEmail')?.value.trim();
        
        if (!uid) {
            alert('Please enter your UID!');
            return;
        }
        
        const body = { uid };
        if (password) body.password = password;
        if (gameName) body.gameName = gameName;
        if (email) body.recoveryEmail = email;
        
        try {
            const res = await fetch('/api/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(body)
            });
            
            const data = await res.json();
            
            if (data.success) {
                checkUserSession();
            } else {
                if (data.message.includes('password')) {
                    document.getElementById('passwordField').style.display = 'block';
                    alert(data.message);
                } else if (data.message.includes('fill all fields')) {
                    document.getElementById('newUserFields').style.display = 'block';
                    alert('Please enter your Game Name and Email Code !');
                } else {
                    alert(data.message);
                }
            }
        } catch(e) {
            alert('Network error!');
        }
    }

    async function loadDashboard() {
        try {
            const res = await fetch('/api/user/dashboard', { credentials: 'include' });
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('userGameName').textContent = data.user.gameName;
                document.getElementById('userUid').textContent = data.user.uid;
                document.getElementById('userEmail').textContent = data.user.recoveryEmail;
                
                // Stats
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${data.stats.totalClaims}</div>
                        <div>Total Claims</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${data.stats.totalDiamonds}</div>
                        <div>Total Diamonds</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${data.stats.pendingClaims}</div>
                        <div>Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${data.stats.completedClaims}</div>
                        <div>Completed</div>
                    </div>
                `;
                
                // Claims Table
                const tbody = document.getElementById('claimsTableBody');
                if (data.claims.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No claims yet</td></tr>';
                } else {
                    tbody.innerHTML = data.claims.map(claim => `
                        <tr>
                            <td>${new Date(claim.claimedAt).toLocaleDateString()}</td>
                            <td><span class="badge-diamond" style="background:linear-gradient(135deg,#FFD700,#FFA500); padding:4px 12px; border-radius:20px;">${claim.diamondAmount} 💎</span></td>
                            <td>${claim.server}</td>
                            <td><span class="status-badge status-${claim.status}">${claim.status}</span></td>
                            <td><small>${claim._id.slice(-6)}</small></td>
                        </tr>
                    `).join('');
                }
            }
        } catch(e) {
            console.error('Dashboard error:', e);
        }
    }

    async function setPassword() {
        const password = document.getElementById('newPassword').value;
        if (!password || password.length < 4) {
            alert('Password must be at least 4 characters');
            return;
        }
        
        try {
            const res = await fetch('/api/user/set-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ password })
            });
            
            const data = await res.json();
            if (data.success) {
                alert('Password set successfully!');
                document.getElementById('newPassword').value = '';
            } else {
                alert(data.message);
            }
        } catch(e) {
            alert('Error setting password');
        }
    }

    async function userLogout() {
        await fetch('/api/user/logout', { method: 'POST', credentials: 'include' });
        checkUserSession();
    }

    // Check UID input for password requirement
    document.getElementById('loginUid')?.addEventListener('input', async function() {
        const uid = this.value.trim();
        if (uid.length >= 8) {
            try {
                const res = await fetch(`/api/user/check-password?uid=${uid}`);
                const data = await res.json();
                if (data.hasPassword) {
                    document.getElementById('passwordField').style.display = 'block';
                } else {
                    document.getElementById('passwordField').style.display = 'none';
                }
            } catch(e) {}
        }
    });

    checkUserSession();
    setInterval(() => { if (document.getElementById('dashboardSection').style.display === 'block') loadDashboard(); }, 10000);
</script>
</body>
</html>
